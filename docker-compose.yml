services:
  redis:
    image: redis:7-alpine
    container_name: ai-kl-redis
    ports:
      - "6379:6379"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.2
    container_name: ai-kl-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  minio:
    image: minio/minio:latest
    container_name: ai-kl-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  airflow-init:
    image: apache/airflow:2.10.5
    container_name: ai-kl-airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/state/airflow.db
      PYTHONPATH: /opt/airflow
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./orchestration/airflow/logs:/opt/airflow/logs
      - ./orchestration/airflow/plugins:/opt/airflow/plugins
      - ./orchestration/airflow/state:/opt/airflow/state
      - ./data:/opt/airflow/data
      - ./warehouse:/opt/warehouse
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install dbt-core dbt-duckdb duckdb pandas &&
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Michel \
          --lastname Dupont \
          --role Admin \
          --email admin@example.com || true

  airflow-webserver:
    image: apache/airflow:2.10.5
    container_name: ai-kl-airflow-webserver
    depends_on:
      - airflow-init
    environment:
      _PIP_ADDITIONAL_REQUIREMENTS: minio
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/state/airflow.db
      PYTHONPATH: /opt/airflow
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./orchestration/airflow/logs:/opt/airflow/logs
      - ./orchestration/airflow/plugins:/opt/airflow/plugins
      - ./orchestration/airflow/state:/opt/airflow/state
      - ./data:/opt/airflow/data
      - ./warehouse:/opt/warehouse
    ports:
      - "8080:8080"
    command: >
      bash -c "pip install dbt-core dbt-duckdb duckdb pandas && airflow webserver"

  airflow-scheduler:
    image: apache/airflow:2.10.5
    container_name: ai-kl-airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      _PIP_ADDITIONAL_REQUIREMENTS: minio
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/state/airflow.db
      PYTHONPATH: /opt/airflow
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./orchestration/airflow/logs:/opt/airflow/logs
      - ./orchestration/airflow/plugins:/opt/airflow/plugins
      - ./orchestration/airflow/state:/opt/airflow/state
      - ./data:/opt/airflow/data
      - ./warehouse:/opt/warehouse
    command: >
      bash -c "pip install dbt-core dbt-duckdb duckdb pandas && airflow scheduler"